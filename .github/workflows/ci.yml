name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # LINTING
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run Ruff linter
        run: |
          uv run ruff check .

  # TYPE CHECKING (skipped - requires type annotations)
  # type-check:
  #   name: Type Check with MyPy
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: ${{ env.PYTHON_VERSION }}

  #     - name: Install uv
  #       uses: astral-sh/setup-uv@v1

  #     - name: Install dependencies
  #       run: |
  #         uv sync --all-extras

  #     - name: Run MyPy type checker
  #       run: |
  #         uv run mypy src/agent-service/
  #         uv run mypy src/ocr-service/
  #       continue-on-error: false

  # TESTING
  test:
    name: Test with Pytest
    runs-on: ubuntu-latest
    needs: [lint]

    strategy:
      matrix:
        service: [agent-service, ocr-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd src/${{ matrix.service }}
          uv run pytest tests/ -v --cov=../${{ matrix.service }} --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./src/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage
          fail_ci_if_error: false

  # SECURITY SCAN
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run pip-audit for dependency vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --desc
        continue-on-error: true

  # DOCKER BUILD TESTS
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      matrix:
        service: [ocr-service, agent-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          file: ./src/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: claims-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test ${{ matrix.service }} container health
        run: |
          docker run -d --name test-${{ matrix.service }} -p 8000:8000 \
            -e GEMINI_API_KEY=dummy_key \
            claims-${{ matrix.service }}:test
          sleep 10
          docker ps
          docker logs test-${{ matrix.service }}
          docker stop test-${{ matrix.service }}
          docker rm test-${{ matrix.service }}

  # INTEGRATION TEST
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start infrastructure services
        run: |
          docker-compose up -d mongodb redis

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until docker-compose ps | grep -q "healthy"; do sleep 2; done'

      - name: Run integration tests
        run: |
          uv sync --all-extras
          uv run pytest src/agent-service/tests/integration/ -v || echo "Integration tests not found, skipping"

      - name: Stop infrastructure services
        if: always()
        run: |
          docker-compose down -v

  # ============================================
  # SUMMARY
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, docker-build, integration]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "CI Pipeline Summary:"
          echo "===================="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Integration: ${{ needs.integration.result }}"

      - name: Fail if any critical job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.docker-build.result == 'failure'
        run: exit 1
