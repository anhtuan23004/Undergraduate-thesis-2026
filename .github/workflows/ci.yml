name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test agent service
        env:
          PYTHONPATH: ${{ github.workspace }}/src/agent-service
        run: uv run pytest src/agent-service/tests -v

      - name: Test OCR service
        env:
          PYTHONPATH: ${{ github.workspace }}/src/ocr-service
        run: uv run pytest src/ocr-service/tests -v

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        service:
          - agent-service
          - ocr-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f src/${{ matrix.service }}/Dockerfile src/${{ matrix.service }}
