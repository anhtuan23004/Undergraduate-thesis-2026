services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    hostname: mongodb
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-admin123}
      - MONGOT_LOG_FILE=/dev/stderr
      - RUNNER_LOG_FILE=/dev/stderr
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d:ro
      - db:/data/db
      - configdb:/data/configdb
      - mongot:/data/mongot
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGODB_INITDB_ROOT_USERNAME}\" --password \"$${MONGODB_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  mongo-express:
    image: mongo-express:latest
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongodb

volumes:
  db:
  configdb:
  mongot:
