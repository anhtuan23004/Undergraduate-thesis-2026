# ============================================
# Agentic AI Insurance Claims Processing System
# Docker Compose Configuration
# ============================================
#
# This configuration composes services from infrastructure:
#   - infrastructure/mongodb/docker-compose-mongodb.yml
#   - infrastructure/langfuse/docker-compose.langfuse.yml
#
# And builds application services:
#   - ocr-service (document text extraction)
#   - agent-service (LangGraph multi-agent workflow)
#
# Quick Start:
#   1. cp .env.example .env
#   2. Edit .env with your GEMINI_API_KEY
#   3. docker-compose up -d --build
#   4. docker-compose logs -f
#
# ============================================

services:
  # ============================================
  # APPLICATION SERVICES
  # ============================================

  ocr-service:
    build:
      context: ./src/ocr-service
      dockerfile: Dockerfile
    container_name: claims-ocr-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ocr_uploads:/app/uploads
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  agent-service:
    build:
      context: ./src/agent-service
      dockerfile: Dockerfile
    container_name: claims-agent-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/claims?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - OCR_SERVICE_URL=http://ocr-service:8000
      - OCR_API_VERSION=${OCR_API_VERSION:-v2}
      - OCR_V2_PIPELINE=${OCR_V2_PIPELINE:-two_phase_gated}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================
# INCLUDE INFRASTRUCTURE SERVICES
# ============================================
include:
  - infrastructure/mongodb/docker-compose-mongodb.yml
  - infrastructure/langfuse/docker-compose.langfuse.yml

# ============================================
# VOLUMES
# ============================================
volumes:
  ocr_uploads:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  backend:
    driver: bridge
