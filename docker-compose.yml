# Complete Docker Compose for Insurance Claims Processing System
# Runs all services: Infrastructure + Application Services
#
# Quick Start:
#   1. cp .env.example .env
#   2. Edit .env with your API keys
#   3. docker-compose up -d
#   4. docker-compose logs -f
#
# Services will start in dependency order automatically

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  # --- MongoDB ---
  mongodb:
    image: mongo:7.0.4
    container_name: claims-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: claims
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: claims-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy

  # ============================================
  # APPLICATION SERVICES
  # ============================================

  # --- OCR Service ---
  ocr-service:
    build:
      context: ./src/ocr-service
      dockerfile: Dockerfile
    container_name: claims-ocr-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ocr_uploads:/app/uploads
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- Agent Service ---
  agent-service:
    build:
      context: ./src/agent-service
      dockerfile: Dockerfile
    container_name: claims-agent-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      - MONGODB_URL=mongodb://claims_app:claims_password@mongodb:27017/claims
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - OCR_SERVICE_URL=http://ocr-service:8000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================
# VOLUMES
# ============================================
volumes:
  mongodb_data:
    driver: local
  ocr_uploads:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  backend:
    driver: bridge
