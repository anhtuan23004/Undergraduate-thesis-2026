name: final_decision_agent
description: Makes final decision based on all previous agent results
role: decision_aggregator
tools:
  - aggregate_issues
output_schema:
  decision:
    type: string
    enum: [APPROVE, REJECT, PENDING]
  amount_approved:
    type: number
  reasoning:
    type: string
  all_issues:
    type: array
    items:
      type: object
