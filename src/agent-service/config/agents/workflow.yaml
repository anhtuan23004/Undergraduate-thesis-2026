name: claims_processing_workflow
version: "1.0.0"
nodes:
  - name: completeness_check
    type: agent
    agent: completeness_check_agent
  - name: quality_check
    type: agent
    agent: quality_check_agent
  - name: human_review
    type: human
  - name: final_decision
    type: agent
    agent: final_agent

edges:
  - from: completeness_check
    to: quality_check
    condition: "result.decision == 'accept'"
  - from: completeness_check
    to: final_decision
    condition: "result.decision == 'reject'"
  - from: completeness_check
    to: human_review
    condition: "result.decision == 'accept_with_edit'"
  - from: quality_check
    to: final_decision
    condition: "result.decision in ['accept', 'reject']"
  - from: quality_check
    to: human_review
    condition: "result.decision == 'accept_with_edit'"
  - from: human_review
    to: quality_check
    condition: "result.decision == 'edit'"
  - from: human_review
    to: final_decision
    condition: "result.decision in ['approve', 'reject']"
