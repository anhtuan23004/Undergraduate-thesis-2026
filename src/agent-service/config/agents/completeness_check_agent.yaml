name: completeness_check_agent
description: Checks if all required documents are present
role: document_verifier
tools:
  - extract_documents
  - classify_benefit
  - check_required_documents
output_schema:
  decision:
    type: string
    enum: [accept, reject, accept_with_edit]
  missing_documents:
    type: array
    items:
      type: string
  confidence:
    type: number
    minimum: 0
    maximum: 1
